{% extends "base.html" %}
{% block body %}
<div class="content">  <!-- Move the closing tag to the end -->
    <h1>Update task</h1>

    <form action="/update/{{task.id}}" method="POST">
        <input type="text" name="content" id="content" value="{{task.content}}">
        <input type="date" name="date" id="date" value="{{task.due_date.date()}}">
        <input type="submit" value="Update">
    </form>
</div>  <!-- Close the content div here -->
{% endblock %}
