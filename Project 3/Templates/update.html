{%extends 'base.html' %}

{% block head%}
<h1 style="text-align: center">Personal Expense tracker</h1><br>
<h2 style="text-align: center;">Update Page</h2>
{% endblock %}

{% block body %}
<form action="/update/{{expense.id}}" method="POST">
        Amount:<input type="number" name="amount" id="amount" step="1">
        <br><br>Description:<input type="text" name="description" id="description"><br><br>
        Category:
        <select name="category" id="category">
            <option value="Food">Food</option>
            <option value="Transportation">Transportation</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Stationery">Stationery</option>
            <option value="Rent">Rent</option>
            <option value="Other">Other</option>
        </select><br><br>
        Payment Method:
        <select name="payment_method" id="payment_method">
            <option value="Cash">Cash</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Debit Card">Debit Card</option>
            <option value="Online Payment">Online Payment</option>
        </select><br><br>
        <input type="submit" value="Update Expense">
    </form>
{%endblock%}
